    <marker id="legend-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7 Z" fill="#15803d"/></marker>
    <marker id="legend-orange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7 Z" fill="#c2410c"/></marker>
    <marker id="legend-purple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7 Z" fill="#7c3aed"/></marker>
    <style>
      .bg{fill:#f8fafc}
      .lane{fill:none;stroke:#cbd5e1;stroke-width:1.5;stroke-dasharray:9 8;rx:28}
      .card{fill:#fff;stroke:#cbd5e1;stroke-width:1.6;rx:20}
      .blue{fill:#eff6ff;stroke:#93c5fd}.green{fill:#ecfdf5;stroke:#86efac}.orange{fill:#fff7ed;stroke:#fdba74}.purple{fill:#f5f3ff;stroke:#c4b5fd}.gray{fill:#f1f5f9;stroke:#cbd5e1}
      .title{font:700 40px Arial,sans-serif;fill:#0f172a}
      .subtitle{font:400 19px Arial,sans-serif;fill:#475569}
      .section{font:700 25px Arial,sans-serif;fill:#0f172a}
      .note{font:400 16px Arial,sans-serif;fill:#64748b}
      .label{font:700 20px Arial,sans-serif;fill:#0f172a}
      .body{font:400 15px Arial,sans-serif;fill:#334155}
      .small{font:400 13px Arial,sans-serif;fill:#475569}
      .mono{font:400 14px Consolas,Monaco,monospace;fill:#1e293b}
      .bold{font:700 14px Consolas,Monaco,monospace;fill:#0f172a}
      .chip{fill:#e2e8f0;stroke:#cbd5e1;stroke-width:1.2;rx:12}
      .chipText{font:700 13px Arial,sans-serif;fill:#334155}
      .ab{fill:none;stroke:#2563eb;stroke-width:2.6;marker-end:url(#arrow-blue)}
      .ag{fill:none;stroke:#15803d;stroke-width:2.6;marker-end:url(#arrow-green)}
      .ao{fill:none;stroke:#c2410c;stroke-width:2.6;marker-end:url(#arrow-orange)}
      .ap{fill:none;stroke:#7c3aed;stroke-width:2.6;marker-end:url(#arrow-purple)}
      .dash{stroke-dasharray:10 8}
