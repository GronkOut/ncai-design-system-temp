  <path class="ag" d="M1690 1645 C1705 1645,1720 1645,1735 1645"/>

  <text class="small" x="100" y="1698">테스트 위치: packages/react/src/components/Checkbox/Checkbox.test.tsx, packages/mcp/src/validation.test.ts, packages/mcp/src/recipe.test.ts, packages/metadata/scripts/validate-metadata.mjs, scripts/smoke-pack.mjs</text>
</svg>
