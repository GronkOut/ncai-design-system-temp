<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1720" viewBox="0 0 2400 1720" role="img" aria-labelledby="title desc">
  <title id="title">NC AI Design System Temp Architecture</title>
  <desc id="desc">NC AI 디자인 시스템 저장소의 제공자 흐름, 사용자 소비 흐름, MCP와 Skill, CLI, Storybook, 테스트와 배포 관계도</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#15803d"/></marker>
    <marker id="arrow-orange" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#c2410c"/></marker>
    <marker id="arrow-purple" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M2,2 L12,7 L2,12 Z" fill="#7c3aed"/></marker>
