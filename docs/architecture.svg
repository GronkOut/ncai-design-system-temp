  <path class="ap dash" d="M1625 1070 C1570 1160,1320 1195,1257 1290"/>
  <path class="ao dash" d="M2075 1085 C2030 1195,1810 1215,1755 1290"/>

  <rect class="lane" x="70" y="1535" width="2260" height="145"/>
  <text class="section" x="100" y="1578">4. 테스트, 검증, 배포 레인</text>
  <text class="note" x="100" y="1605">CI는 PR/main push에서 실행되고, Release 워크플로는 수동 실행 후 Changesets로 npm publish를 수행한다.</text>

  <rect class="card gray" x="105" y="1625" width="245" height="40"/><text class="bold" x="125" y="1650">GitHub Actions</text>
  <rect class="card gray" x="395" y="1625" width="235" height="40"/><text class="bold" x="415" y="1650">pnpm typecheck</text>
  <rect class="card gray" x="675" y="1625" width="215" height="40"/><text class="bold" x="695" y="1650">pnpm validate</text>
  <rect class="card gray" x="935" y="1625" width="190" height="40"/><text class="bold" x="955" y="1650">pnpm test</text>
  <rect class="card gray" x="1170" y="1625" width="190" height="40"/><text class="bold" x="1190" y="1650">pnpm build</text>
  <rect class="card gray" x="1405" y="1625" width="285" height="40"/><text class="bold" x="1425" y="1650">pnpm smoke:pack</text>
  <rect class="card green" x="1735" y="1625" width="260" height="40"/><text class="bold" x="1755" y="1650">changeset publish</text>

  <path class="ag" d="M350 1645 C365 1645,380 1645,395 1645"/>
  <path class="ag" d="M630 1645 C645 1645,660 1645,675 1645"/>
  <path class="ag" d="M890 1645 C905 1645,920 1645,935 1645"/>
